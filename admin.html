<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preyank Limbachiya Salon · Service Menu Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600&family=Italiana&family=Manrope:wght@200;300;400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0e0d0b;
            --panel-bg: rgba(26, 24, 21, 0.65);
            --gold-500: #cfb892;
            --gold-600: #b59f7b;
            --gold-light: rgba(207, 184, 146, 0.15);
            --ink-1000: #ffffff;
            --ink-800: #e5e3df;
            --warm-700: #a9a6a0;
            --line: rgba(207, 184, 146, 0.12);
            --border-focus: rgba(207, 184, 146, 0.5);
            --error: #ff4a4a;
            --success: #4eff8a;
            --font-display: 'Italiana', serif;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Manrope', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ink-1000);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding: 60px 20px;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(207, 184, 146, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(207, 184, 146, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 50px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 300;
            letter-spacing: 0.05em;
            color: var(--ink-800);
        }

        h1 em {
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--gold-500);
        }

        .subtitle {
            font-family: var(--font-serif);
            font-size: 18px;
            color: var(--warm-700);
            margin-top: 5px;
            font-style: italic;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: 1px solid var(--gold-500);
            background: transparent;
            color: var(--gold-500);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            text-decoration: none;
        }

        .btn:hover {
            background: var(--gold-500);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(207, 184, 146, 0.2);
            transform: translateY(-2px);
        }

        .btn--primary {
            background: var(--gold-500);
            color: var(--bg-color);
        }

        .btn--primary:hover {
            background: var(--ink-1000);
            border-color: var(--ink-1000);
            color: var(--bg-color);
        }

        .btn--danger {
            border-color: var(--error);
            color: var(--error);
        }

        .btn--danger:hover {
            background: var(--error);
            color: var(--ink-1000);
        }

        .btn--sm {
            padding: 6px 12px;
            font-size: 10px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 50px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 400;
            color: var(--gold-500);
            border-bottom: 1px solid var(--line);
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--warm-700);
            margin-bottom: 8px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
            color: var(--ink-1000);
            font-family: var(--font-sans);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            border-radius: 2px;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 10px rgba(207, 184, 146, 0.05);
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
            gap: 20px;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item__info {
            flex-grow: 1;
        }

        .menu-item__name {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--ink-1000);
        }

        .menu-item__desc {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 14px;
            color: var(--warm-700);
            margin-top: 4px;
        }

        .menu-item__price {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--gold-500);
            margin-top: 4px;
        }

        .menu-item__actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            background: var(--panel-bg);
            border-left: 4px solid var(--gold-500);
            color: var(--ink-1000);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast--success {
            border-left-color: var(--success);
        }

        .toast--error {
            border-left-color: var(--error);
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--warm-700);
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 16px;
        }

        .section-header {
            margin-top: 40px;
            margin-bottom: 20px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold-500);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: var(--line);
        }

        .help-text {
            font-size: 11px;
            color: var(--warm-700);
            margin-top: 4px;
        }

        .price-badge {
            background: var(--gold-light);
            padding: 2px 8px;
            font-size: 10px;
            color: var(--gold-500);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Menu <em>Manager</em></h1>
                <p class="subtitle">Add, edit, or remove services from the dynamic salon-data.json</p>
            </div>
            <div class="btn-group">
                <a href="/" class="btn">View Live Site</a>
                <button class="btn btn--primary" id="saveBtn">Save Changes</button>
            </div>
        </header>

        <div class="layout">
            <!-- Left Side: List of Services -->
            <div class="list-section">
                
                <div class="card">
                    <div class="section-header">Women's Rituals</div>
                    <ul class="menu-list" id="femaleList">
                        <!-- Female services injected here -->
                    </ul>
                    <div class="empty-state" id="femaleEmpty" style="display:none;">No female services added.</div>

                    <div class="section-header" style="margin-top: 50px;">Men's Grooming</div>
                    <ul class="menu-list" id="maleList">
                        <!-- Male services injected here -->
                    </ul>
                    <div class="empty-state" id="maleEmpty" style="display:none;">No male services added.</div>
                </div>

            </div>

            <!-- Right Side: Add / Edit Form -->
            <div class="form-section">
                <div class="card" style="position: sticky; top: 30px;">
                    <h2 class="card-title" id="formTitle">Add Service</h2>
                    <form id="serviceForm">
                        <input type="hidden" id="editIndex" value="">

                        <div class="form-group">
                            <label for="serviceName">Service Name</label>
                            <input type="text" id="serviceName" required placeholder="e.g. Balayage & Cut">
                        </div>

                        <div class="form-group">
                            <label for="serviceDesc">Description</label>
                            <textarea id="serviceDesc" required placeholder="e.g. Freehand hair painting finished with style blow dry."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="servicePrice">Price Label</label>
                            <input type="text" id="servicePrice" required placeholder="e.g. from <em>₹899</em>">
                            <span class="help-text">You can include HTML tags like <code>&lt;em&gt;</code> for the dynamic font formatting.</span>
                        </div>

                        <div class="form-group">
                            <label for="serviceGender">Gender Category</label>
                            <select id="serviceGender" required>
                                <option value="female">Women's Couture (female)</option>
                                <option value="male">Men's Grooming (male)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="serviceCategory">Service Type / Tab</label>
                            <select id="serviceCategory" required>
                                <option value="hair">Hair Couture (hair)</option>
                                <option value="skin">Skin &amp; Glow (skin)</option>
                                <option value="nails">Nail Artistry (nails)</option>
                                <option value="grooming">Grooming &amp; Body (grooming)</option>
                            </select>
                        </div>

                        <div class="btn-group" style="margin-top: 30px;">
                            <button type="submit" class="btn btn--primary" id="submitFormBtn">Add to List</button>
                            <button type="button" class="btn" id="cancelEditBtn" style="display: none;">Cancel Edit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let services = [];

        // Fetch current services on load
        async function loadServices() {
            try {
                const response = await fetch('/salon-data.json');
                const data = await response.json();
                services = data.services || [];
                renderServices();
            } catch (err) {
                showToast('Failed to load services data.', 'error');
            }
        }

        // Render lists grouped by gender
        function renderServices() {
            const femaleList = document.getElementById('femaleList');
            const maleList = document.getElementById('maleList');
            
            femaleList.innerHTML = '';
            maleList.innerHTML = '';

            let femaleCount = 0;
            let maleCount = 0;

            services.forEach((service, index) => {
                const gender = service.gender ? service.gender.toLowerCase() : 'female';
                const category = service.category ? service.category.toLowerCase() : 'hair';
                const li = document.createElement('li');
                li.className = 'menu-item';
                
                // Construct inner contents safely
                li.innerHTML = `
                    <div class="menu-item__info">
                        <div class="menu-item__name">
                            ${escapeHtml(service.name)} 
                            <span class="price-badge">${gender}</span>
                            <span class="price-badge" style="background:var(--gold-500);color:var(--bg-color)">${escapeHtml(category)}</span>
                        </div>
                        <div class="menu-item__desc">${escapeHtml(service.desc)}</div>
                        <div class="menu-item__price">${service.price}</div>
                    </div>
                    <div class="menu-item__actions">
                        <button class="btn btn--sm" onclick="editService(${index})">Edit</button>
                        <button class="btn btn--danger btn--sm" onclick="deleteService(${index})">Delete</button>
                    </div>
                `;

                if (gender === 'male') {
                    maleList.appendChild(li);
                    maleCount++;
                } else {
                    femaleList.appendChild(li);
                    femaleCount++;
                }
            });

            document.getElementById('femaleEmpty').style.display = femaleCount === 0 ? 'block' : 'none';
            document.getElementById('maleEmpty').style.display = maleCount === 0 ? 'block' : 'none';
        }

        // Utility to escape HTML and prevent XSS on input values
        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Handle Add / Update submission
        document.getElementById('serviceForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('serviceName').value;
            const desc = document.getElementById('serviceDesc').value;
            const price = document.getElementById('servicePrice').value;
            const gender = document.getElementById('serviceGender').value;
            const category = document.getElementById('serviceCategory').value;
            const editIndexVal = document.getElementById('editIndex').value;

            const serviceData = { name, desc, price, gender, category };

            if (editIndexVal !== '') {
                // Update
                const index = parseInt(editIndexVal);
                services[index] = serviceData;
                showToast('Service updated in memory. Remember to click "Save Changes" to apply.', 'success');
                resetForm();
            } else {
                // Add
                services.push(serviceData);
                showToast('Service added in memory. Remember to click "Save Changes" to apply.', 'success');
                resetForm();
            }

            renderServices();
        });

        // Trigger Edit mode
        window.editService = function(index) {
            const service = services[index];
            document.getElementById('serviceName').value = service.name;
            document.getElementById('serviceDesc').value = service.desc;
            document.getElementById('servicePrice').value = service.price;
            document.getElementById('serviceGender').value = service.gender || 'female';
            document.getElementById('serviceCategory').value = service.category || 'hair';
            document.getElementById('editIndex').value = index;

            document.getElementById('formTitle').textContent = 'Edit Service';
            document.getElementById('submitFormBtn').textContent = 'Update';
            document.getElementById('cancelEditBtn').style.display = 'inline-flex';
        };

        // Cancel Edit Mode
        document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

        function resetForm() {
            document.getElementById('serviceForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('formTitle').textContent = 'Add Service';
            document.getElementById('submitFormBtn').textContent = 'Add to List';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        // Delete Service
        window.deleteService = function(index) {
            if (confirm('Are you sure you want to remove this service from list?')) {
                services.splice(index, 1);
                renderServices();
                showToast('Service removed from memory. Click "Save Changes" to write to disk.', 'success');
                resetForm();
            }
        };

        // Save changes to server disk
        document.getElementById('saveBtn').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/save-services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ services: services })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('All changes saved to salon-data.json!', 'success');
                    // Reload to re-fetch clean indices and numbers from disk
                    setTimeout(loadServices, 500);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showToast('Error saving: ' + err.message, 'error');
            }
        });

        // Show Toast Notifications
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type === 'error') {
                toast.classList.add('toast--error');
            } else {
                toast.classList.add('toast--success');
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize on load
        loadServices();
    </script>
</body>
</html>
